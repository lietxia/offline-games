<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线游戏商城 - PWA Game Store</title>
    <meta name="description" content="70+ 经典游戏的离线商城">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .game-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .game-card:hover { transform: translateY(-4px); }
        .game-title { font-size: 1.2em; font-weight: bold; margin-bottom: 8px; color: #333; }
        .game-desc { color: #666; font-size: 0.9em; margin-bottom: 15px; }
        .game-category { display: inline-block; background: #e0e7ff; color: #4f46e5; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; margin-bottom: 10px; }
        .game-link { display: inline-block; background: #667eea; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.9em; }
        .category { margin-bottom: 40px; }
        .category-title { color: white; font-size: 1.5em; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.3); }
        .offline-status { position: fixed; top: 10px; right: 10px; background: #4CAF50; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; }
        .stats { text-align: center; color: white; margin-bottom: 20px; opacity: 0.9; }
        .search-box { width: 100%; max-width: 400px; margin: 20px auto; padding: 12px 20px; border: none; border-radius: 25px; font-size: 16px; background: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
    <div class="offline-status" id="offlineStatus">在线</div>
    <div class="container">
        <header>
            <h1>🎮 离线游戏商城</h1>
            <p>70+ 经典游戏，完全离线畅玩</p>
            <div class="stats">
                <span id="gameCount">77</span> 款游戏 | <span id="categoryCount">6</span> 个分类
            </div>
            <input type="text" class="search-box" placeholder="搜索游戏..." id="searchBox">
        </header>
        
        <main id="gamesContainer">
            <!-- 游戏将通过JavaScript动态加载 -->
        </main>
    </div>

    <script>
        // PWA检测
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }

        // 离线状态检测
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        function updateOnlineStatus() {
            document.getElementById('offlineStatus').textContent = 
                navigator.onLine ? '在线' : '离线';
            document.getElementById('offlineStatus').style.background = 
                navigator.onLine ? '#4CAF50' : '#f44336';
        }
        updateOnlineStatus();

        // 加载游戏数据
        let allGames = [];
        let filteredGames = [];

        fetch('./games-config.json')
            .then(response => response.json())
            .then(data => {
                allGames = data.games;
                filteredGames = [...allGames];
                renderGames();
                document.getElementById('gameCount').textContent = allGames.length;
                document.getElementById('categoryCount').textContent = data.categories.length;
            })
            .catch(error => {
                console.error('Failed to load games config:', error);
                // Fallback games
                allGames = [
                    { name: '扫雷', desc: '经典扫雷游戏', category: '微软经典', path: 'games/microsoft-classics/Minesweeper/index.html' },
                    { name: '2048', desc: '数字合并游戏', category: '数字益智', path: 'games/digital-puzzles/2048/index.html' },
                    { name: '俄罗斯方块', desc: '经典方块游戏', category: '街机动作', path: 'games/arcade-action/tetris/index.html' }
                ];
                filteredGames = [...allGames];
                renderGames();
            });

        // 搜索功能
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            filteredGames = allGames.filter(game => 
                game.name.toLowerCase().includes(searchTerm) || 
                game.description.toLowerCase().includes(searchTerm)
            );
            renderGames();
        });

        // 渲染游戏
        function renderGames() {
            const container = document.getElementById('gamesContainer');
            const categories = [...new Set(filteredGames.map(game => game.category))];
            
            let html = '';
            categories.forEach(category => {
                const categoryGames = filteredGames.filter(game => game.category === category);
                html += `
                    <div class="category">
                        <h2 class="category-title">${category} (${categoryGames.length})</h2>
                        <div class="games-grid">
                `;
                categoryGames.forEach(game => {
                    html += `
                        <div class="game-card">
                            <div class="game-category">${game.category}</div>
                            <div class="game-title">${game.name}</div>
                            <div class="game-desc">${game.description}</div>
                            <a href="${game.path}" class="game-link" target="_blank">开始游戏</a>
                        </div>
                    `;
                });
                html += `
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
